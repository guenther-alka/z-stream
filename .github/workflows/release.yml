name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build zstream
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: zstream-linux-amd64
          - goos: linux
            goarch: arm64
            output: zstream-linux-arm64
          - goos: windows
            goarch: amd64
            output: zstream-windows-amd64.exe
          - goos: freebsd
            goarch: amd64
            output: zstream-freebsd-amd64
          - goos: solaris
            goarch: amd64
            output: zstream-solaris-amd64
          - goos: illumos
            goarch: amd64
            output: zstream-illumos-amd64
          - goos: darwin
            goarch: amd64
            output: zstream-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: zstream-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ${{ matrix.output }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Upload binaries to existing release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
